name: Specmatic Contract & Resiliency Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak espeak-ng libespeak1 ffmpeg curl

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Specmatic Mock for Ollama
        run: |
          docker run -d \
            --name ollama-mock \
            --network host \
            -v "${{ github.workspace }}/mock:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic stub ollama_api.yaml --port 8888

      - name: Wait For Ollama Mock
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8888/api/tags > /dev/null; then
              echo "Ollama mock is up"; exit 0
            fi
            echo "Waiting for Ollama mock... ($i)"; sleep 2
          done
          echo "Ollama mock failed to start"; docker logs ollama-mock || true; exit 1

      - name: Start TRIO Backend
        working-directory: backend
        env:
          OLLAMA_BASE_URL: http://localhost:8888
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &

      - name: Wait For Backend
        working-directory: backend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is up"; exit 0
            fi
            echo "Waiting for backend... ($i)"; sleep 2
          done
          echo "Backend failed to start"; cat server.log || true; exit 1

      - name: Run Contract Tests (happy path only)
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic test trio_api.yaml \
            --testBaseURL=http://localhost:8000
          # Save the contract report
          mkdir -p reports/contract
          cp -r build/reports/specmatic/test/html/* reports/contract/

      - name: Run Resiliency Tests (generative)
        env:
          SPECMATIC_GENERATIVE_TESTS: "true"
        run: |
          docker run --rm \
            --network host \
            -e SPECMATIC_GENERATIVE_TESTS=true \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic test trio_api.yaml \
            --testBaseURL=http://localhost:8000
          # Save the resiliency report
          mkdir -p reports/resiliency
          cp -r build/reports/specmatic/test/html/* reports/resiliency/

      - name: Upload Contract Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: reports/contract

      - name: Upload Resiliency Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resiliency-test-report
          path: reports/resiliency

      - name: Upload Backend Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: backend/server.log

      - name: Stop Ollama Mock
        if: always()
        run: docker rm -f ollama-mock || true