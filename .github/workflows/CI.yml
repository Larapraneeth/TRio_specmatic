name: Specmatic Contract & Resiliency Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Specmatic mock of the Ollama LLM
        run: |
          docker run -d --name ollama-mock --network host \
            -v "${{ github.workspace }}/mock:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic stub ollama_api.yaml --port 8888
          # Wait for the mock to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8888/api/tags > /dev/null; then
              echo "Ollama mock is up"; break
            fi
            echo "Waiting for Ollama mock... ($i)"; sleep 2
          done

      - name: Start TRIO backend (pointed at the mocked LLM)
        working-directory: backend
        env:
          OLLAMA_BASE_URL: http://localhost:8888
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is up"; break
            fi
            echo "Waiting for backend... ($i)"; sleep 2
          done
          curl -sf http://localhost:8000/health || (echo "Backend failed to start"; cat server.log; exit 1)

      - name: Run Specmatic contract + resiliency tests
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic test trio_api.yaml \
            --testBaseURL=http://localhost:8000

      - name: Stop Ollama mock
        if: always()
        run: docker rm -f ollama-mock || true

      - name: Upload Specmatic HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-html-report
          path: build/reports/specmatic/test/html