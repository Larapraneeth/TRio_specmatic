name: Specmatic Contract & Resiliency Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start TRIO Backend
        working-directory: backend
        env:
          SPECMATIC_TEST: "true"
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &

          echo "Waiting for backend..."

          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is up"
              break
            fi

            echo "Waiting... ($i)"
            sleep 2
          done

          curl -sf http://localhost:8000/health || (echo "Backend failed to start"; cat server.log; exit 1)

      - name: Run Contract Tests
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic test trio_api.yaml \
            --testBaseURL=http://localhost:8000

      - name: Run Resiliency Tests
        run: |
          docker run --rm \
            --network host \
            -e SPECMATIC_GENERATIVE_TESTS=true \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/specmatic test trio_api.yaml \
            --testBaseURL=http://localhost:8000

      - name: Upload Specmatic HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-html-report
          path: build/reports/specmatic/test/html

      - name: Upload Backend Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: backend/server.log