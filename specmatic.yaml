version: 3

systemUnderTest:
  service:
    $ref: "#/components/services/trioService"

components:
  sources:
    localSpecs:
      filesystem:
        directory: .
  services:
    trioService:
      description: TRIO Agentic AI backend (FastAPI)
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - trio_api.yaml
      runOptions:
        openapi:
          type: test
          baseUrl: "http://host.docker.internal:8000"